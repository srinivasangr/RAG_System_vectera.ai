[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers — register them so `--strict-markers` doesn't warn
markers =
    unit: pure unit tests, no external services required
    integration: needs at least one external service (Snowflake / Gemini / Cerebras)
    snowflake: needs a working Snowflake connection (settings + creds)
    gemini: needs GEMINI_API_KEY
    cerebras: needs CEREBRAS_API_KEY
    docling: needs Docling installed (heavy import)

addopts =
    -ra
    --strict-markers
    --tb=short

# Don't auto-discover tests in scripts/ — they're operational helpers, not tests
norecursedirs = .venv venv build dist .git .cache scripts
